<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VitaTrack – Health Tracker</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #667eea;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.5em;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 1.1em;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }
    .stat-card h3 {
      font-size: 0.9em;
      opacity: 0.9;
      margin-bottom: 10px;
    }
    .stat-card .value {
      font-size: 2em;
      font-weight: bold;
    }
    .form-section {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    .form-section h2 {
      color: #667eea;
      margin-bottom: 20px;
      font-size: 1.5em;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #333;
      font-weight: 500;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      transition: transform 0.2s;
      font-weight: bold;
    }
    button:hover {
      transform: translateY(-2px);
    }
    .entry-list {
      margin-top: 20px;
    }
    .entry {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 4px solid #667eea;
    }
    .entry-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .entry-date {
      font-weight: bold;
      color: #667eea;
    }
    .delete-btn {
      background: #dc3545;
      padding: 5px 15px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function VitaTrack() {
      const [entries, setEntries] = useState([]);
      const [weight, setWeight] = useState('');
      const [exercise, setExercise] = useState('');
      const [mood, setMood] = useState('dobry');
      const [notes, setNotes] = useState('');

      useEffect(() => {
        const saved = localStorage.getItem('vitatrack-data');
        if (saved) {
          setEntries(JSON.parse(saved));
        }
      }, []);

      useEffect(() => {
        localStorage.setItem('vitatrack-data', JSON.stringify(entries));
      }, [entries]);

      const addEntry = (e) => {
        e.preventDefault();
        const newEntry = {
          id: Date.now(),
          date: new Date().toLocaleString('pl-PL'),
          weight: weight ? parseFloat(weight) : null,
          exercise,
          mood,
          notes
        };
        setEntries([newEntry, ...entries]);
        setWeight('');
        setExercise('');
        setMood('dobry');
        setNotes('');
      };

      const deleteEntry = (id) => {
        setEntries(entries.filter(entry => entry.id !== id));
      };

      const avgWeight = entries.filter(e => e.weight).length > 0
        ? (entries.filter(e => e.weight).reduce((sum, e) => sum + e.weight, 0) / entries.filter(e => e.weight).length).toFixed(1)
        : '---';

      const totalExercises = entries.filter(e => e.exercise).length;

      return (
        <div className="container">
          <h1>💚 VitaTrack</h1>
          <p className="subtitle">Zdrowie · Waga · Styl życia</p>

          <div className="stats">
            <div className="stat-card">
              <h3>Średnia waga</h3>
              <div className="value">{avgWeight} kg</div>
            </div>
            <div className="stat-card">
              <h3>Liczba wpisów</h3>
              <div className="value">{entries.length}</div>
            </div>
            <div className="stat-card">
              <h3>Ćwiczenia</h3>
              <div className="value">{totalExercises}</div>
            </div>
          </div>

          <div className="form-section">
            <h2>Dodaj wpis</h2>
            <form onSubmit={addEntry}>
              <div className="form-group">
                <label>Waga (kg)</label>
                <input
                  type="number"
                  step="0.1"
                  value={weight}
                  onChange={(e) => setWeight(e.target.value)}
                  placeholder="np. 75.5"
                />
              </div>
              <div className="form-group">
                <label>Ćwiczenia</label>
                <input
                  type="text"
                  value={exercise}
                  onChange={(e) => setExercise(e.target.value)}
                  placeholder="np. Bieganie 30 min"
                />
              </div>
              <div className="form-group">
                <label>Nastrój</label>
                <select value={mood} onChange={(e) => setMood(e.target.value)}>
                  <option value="świetny">😊 Świetny</option>
                  <option value="dobry">🙂 Dobry</option>
                  <option value="neutralny">😐 Neutralny</option>
                  <option value="słaby">😔 Słaby</option>
                </select>
              </div>
              <div className="form-group">
                <label>Notatki</label>
                <textarea
                  value={notes}
                  onChange={(e) => setNotes(e.target.value)}
                  placeholder="Dodatkowe obserwacje..."
                  rows="3"
                />
              </div>
              <button type="submit">Dodaj wpis</button>
            </form>
          </div>

          <div className="form-section">
            <h2>Historia wpisów</h2>
            <div className="entry-list">
              {entries.length === 0 ? (
                <p style={{textAlign: 'center', color: '#999'}}>Brak wpisów. Dodaj pierwszy!</p>
              ) : (
                entries.map(entry => (
                  <div key={entry.id} className="entry">
                    <div className="entry-header">
                      <span className="entry-date">{entry.date}</span>
                      <button className="delete-btn" onClick={() => deleteEntry(entry.id)}>Usuń</button>
                    </div>
                    {entry.weight && <p><strong>Waga:</strong> {entry.weight} kg</p>}
                    {entry.exercise && <p><strong>Ćwiczenia:</strong> {entry.exercise}</p>}
                    <p><strong>Nastrój:</strong> {entry.mood}</p>
                    {entry.notes && <p><strong>Notatki:</strong> {entry.notes}</p>}
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<VitaTrack />, document.getElementById('root'));
  </script>
</body>
</html>
