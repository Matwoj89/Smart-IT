const { useState, useEffect, useRef, useCallback } = React;

const CHECKPOINTS = [108, 102, 98, 96, 94, 92, 90, 88, 86];
const STORAGE_KEY = "health-tracker-weights";
const DAY_MS = 86400000;
const INITIAL_DATA = [
  { date: "2026-03-12", weight: 110.0 },
  { date: "2026-03-13", weight: 109.5 },
  { date: "2026-03-14", weight: 108.0 },
];

const MONTHS_SHORT = ["sty","lut","mar","kwi","maj","cze","lip","sie","wrz","paź","lis","gru"];
const MONTHS_FULL  = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
const DAYS_SHORT   = ["Pn","Wt","Śr","Cz","Pt","So","Nd"];

function dateToMs(s)   { return new Date(s + "T00:00:00").getTime(); }
function msToDateStr(ms) {
  const d = new Date(ms);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function msToLabel(ms) {
  const d = new Date(ms);
  return `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;
}
function formatDate(s) {
  const d = new Date(s + "T00:00:00");
  return `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;
}
function nextCheckpoint(w) { return CHECKPOINTS.find(c => c < w) ?? 86; }

function drawChart(canvas, entries, rangeMs, todayMs) {
  const dpr  = window.devicePixelRatio || 1;
  const W    = canvas.parentElement ? canvas.parentElement.clientWidth : 580;
  const H    = 320;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);

  const PAD = { top: 14, right: 48, bottom: 34, left: 46 };
  const pW  = W - PAD.left - PAD.right;
  const pH  = H - PAD.top  - PAD.bottom;
  const minY = 84, maxY = 113;
  const sorted0  = [...entries].sort((a, b) => a.date.localeCompare(b.date));
  const anchorMs = sorted0.length > 0 ? dateToMs(sorted0[sorted0.length - 1].date) : todayMs;
  const winStart = anchorMs - rangeMs * 0.75;
  const winEnd   = anchorMs + rangeMs * 0.25;

  const xOf = ms  => PAD.left + ((ms  - winStart) / (winEnd   - winStart)) * pW;
  const yOf = val => PAD.top  + (1   - (val - minY) / (maxY   - minY))    * pH;

  ctx.clearRect(0, 0, W, H);

  // Horizontal grid
  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.lineWidth = 0.5;
  for (let kg = 84; kg <= 112; kg += 4) {
    const y = yOf(kg);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + pW, y); ctx.stroke();
  }

  // Checkpoint lines + right labels
  ctx.setLineDash([4, 5]);
  ctx.lineWidth = 1;
  const monoFont = "9px monospace";
  CHECKPOINTS.forEach((cp, idx) => {
    const y = yOf(cp);
    ctx.fillStyle = "rgba(245,158,11,0.35)";
    ctx.font = monoFont;
    ctx.textAlign = "left";
    ctx.fillText(`${cp}`, PAD.left + pW + 4, y + 3);
    if (idx % 2 === 0) {
      ctx.strokeStyle = "rgba(245,158,11,0.27)";
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + pW, y); ctx.stroke();
    }
  });
  ctx.setLineDash([]);

  // Today vertical line
  if (todayMs >= winStart && todayMs <= winEnd) {
    const x = xOf(todayMs);
    ctx.strokeStyle = "rgba(255,255,255,0.07)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top + pH); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = "rgba(255,255,255,0.1)";
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(PAD.left, PAD.top);    ctx.lineTo(PAD.left, PAD.top + pH);
  ctx.moveTo(PAD.left, PAD.top+pH); ctx.lineTo(PAD.left + pW, PAD.top + pH);
  ctx.stroke();

  // Y labels
  ctx.fillStyle = "#4b5563";
  ctx.font = "10px monospace";
  ctx.textAlign = "right";
  for (let kg = 88; kg <= 112; kg += 4) {
    ctx.fillText(`${kg}`, PAD.left - 5, yOf(kg) + 3);
  }

  // X ticks
  const days = rangeMs / DAY_MS;
  const step = days <= 7 ? 1 : days <= 21 ? 2 : days <= 60 ? 7 : days <= 120 ? 14 : 30;
  const firstTick = Math.ceil(winStart / (step * DAY_MS)) * (step * DAY_MS);
  ctx.fillStyle = "#4b5563";
  ctx.font = "10px monospace";
  ctx.textAlign = "center";
  for (let t = firstTick; t <= winEnd; t += step * DAY_MS) {
    const x = xOf(t);
    ctx.fillText(msToLabel(t), x, PAD.top + pH + 18);
    ctx.strokeStyle = "rgba(255,255,255,0.07)";
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, PAD.top + pH); ctx.lineTo(x, PAD.top + pH + 4); ctx.stroke();
  }

  const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));

  // Weight line
  const visible = sorted
    .map(e => ({ ms: dateToMs(e.date), w: e.weight }))
    .filter(p => p.ms >= winStart && p.ms <= winEnd);

  if (visible.length >= 2) {
    ctx.strokeStyle = "#22c55e";
    ctx.lineWidth = 2.5;
    ctx.lineJoin = "round";
    ctx.beginPath();
    visible.forEach((p, i) => {
      i === 0 ? ctx.moveTo(xOf(p.ms), yOf(p.w)) : ctx.lineTo(xOf(p.ms), yOf(p.w));
    });
    ctx.stroke();
  }

  // Dots
  visible.forEach((p, i) => {
    const isLast = i === visible.length - 1;
    ctx.beginPath();
    ctx.arc(xOf(p.ms), yOf(p.w), isLast ? 5 : 3, 0, Math.PI * 2);
    ctx.fillStyle = isLast ? "#22c55e" : "rgba(34,197,94,0.65)";
    ctx.fill();
    if (isLast) {
      ctx.strokeStyle = "rgba(255,255,255,0.7)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  });

  // Weight label on last visible point
  if (visible.length > 0) {
    const p = visible[visible.length - 1];
    const x = xOf(p.ms), y = yOf(p.w);
    ctx.fillStyle = "#22c55e";
    ctx.font = "bold 11px monospace";
    ctx.textAlign = x > PAD.left + pW - 60 ? "right" : "left";
    ctx.fillText(`${p.w.toFixed(1)} kg`, x + (x > PAD.left + pW - 60 ? -10 : 10), y - 8);
  }
}

function DatePicker({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const [viewing, setViewing] = useState(() => {
    const d = value ? new Date(value + "T00:00:00") : new Date();
    return { year: d.getFullYear(), month: d.getMonth() };
  });
  const { year, month } = viewing;
  const totalDays   = new Date(year, month + 1, 0).getDate();
  const startOffset = (new Date(year, month, 1).getDay() + 6) % 7;
  const cells = [...Array(startOffset).fill(null), ...Array.from({length:totalDays},(_,i)=>i+1)];
  const sel   = value ? new Date(value + "T00:00:00") : null;

  return (
    <div style={{ position:"relative" }}>
      <button onClick={() => setOpen(o => !o)} style={{
        background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)",
        borderRadius:8, color:"#cbd5e1", padding:"8px 12px", fontSize:13,
        fontFamily:"monospace", cursor:"pointer", minWidth:130, textAlign:"left",
      }}>{value || "wybierz datę"}</button>
      {open && (
        <div style={{ position:"absolute", top:"calc(100% + 6px)", left:0, zIndex:200,
          background:"#1e2d42", border:"1px solid rgba(255,255,255,0.12)",
          borderRadius:10, padding:12, width:236 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <button onClick={() => setViewing(v => ({ month: v.month===0?11:v.month-1, year: v.month===0?v.year-1:v.year }))}
              style={{ background:"none", border:"none", color:"#94a3b8", cursor:"pointer", fontSize:16, padding:"0 6px" }}>‹</button>
            <span style={{ fontSize:12, fontFamily:"monospace", color:"#f1f5f9" }}>{MONTHS_FULL[month]} {year}</span>
            <button onClick={() => setViewing(v => ({ month: v.month===11?0:v.month+1, year: v.month===11?v.year+1:v.year }))}
              style={{ background:"none", border:"none", color:"#94a3b8", cursor:"pointer", fontSize:16, padding:"0 6px" }}>›</button>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:4 }}>
            {DAYS_SHORT.map(d => <div key={d} style={{ fontSize:9, color:"#475569", textAlign:"center", fontFamily:"monospace" }}>{d}</div>)}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
            {cells.map((d, i) => {
              if (!d) return <div key={`_${i}`}/>;
              const isSel = sel && sel.getFullYear()===year && sel.getMonth()===month && sel.getDate()===d;
              const isNow = new Date().getFullYear()===year && new Date().getMonth()===month && new Date().getDate()===d;
              return (
                <button key={d} onClick={() => {
                  onChange(`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
                  setOpen(false);
                }} style={{
                  background: isSel?"#22c55e": isNow?"rgba(34,197,94,0.15)":"none",
                  border:"none", borderRadius:6,
                  color: isSel?"#052e16": isNow?"#22c55e":"#cbd5e1",
                  fontSize:11, fontFamily:"monospace", padding:"5px 0", cursor:"pointer",
                }}>{d}</button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}
