<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VitaTrack – Health Tracker</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const CHECKPOINTS = [108, 102, 98, 96, 94, 92, 90, 88, 86];
const STORAGE_KEY = "health-tracker-weights";
const DAY_MS = 86400000;
const INITIAL_DATA = [
  { date: "2026-03-12", weight: 110.0 },
  { date: "2026-03-13", weight: 109.5 },
  { date: "2026-03-14", weight: 108.0 },
];

const MONTHS_SHORT = ["sty","lut","mar","kwi","maj","cze","lip","sie","wrz","paź","lis","gru"];
const MONTHS_FULL  = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
const DAYS_SHORT   = ["Pn","Wt","Śr","Cz","Pt","So","Nd"];

function dateToMs(s)   { return new Date(s + "T00:00:00").getTime(); }
function msToDateStr(ms) {
  const d = new Date(ms);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function msToLabel(ms) {
  const d = new Date(ms);
  return `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;
}
function formatDate(s) {
  const d = new Date(s + "T00:00:00");
  return `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;
}
function nextCheckpoint(w) { return CHECKPOINTS.find(c => c < w) ?? 86; }

function drawChart(canvas, entries, rangeMs, todayMs) {
  const dpr  = window.devicePixelRatio || 1;
  const W    = canvas.parentElement ? canvas.parentElement.clientWidth : 580;
  const H    = 320;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);

  const PAD = { top: 14, right: 48, bottom: 34, left: 46 };
  const pW  = W - PAD.left - PAD.right;
  const pH  = H - PAD.top  - PAD.bottom;
  const minY = 84, maxY = 113;
  const sorted0  = [...entries].sort((a, b) => a.date.localeCompare(b.date));
  const anchorMs = sorted0.length > 0 ? dateToMs(sorted0[sorted0.length - 1].date) : todayMs;
  const winStart = anchorMs - rangeMs * 0.75;
  const winEnd   = anchorMs + rangeMs * 0.25;

  const xOf = ms  => PAD.left + ((ms  - winStart) / (winEnd   - winStart)) * pW;
  const yOf = val => PAD.top  + (1   - (val - minY) / (maxY   - minY))    * pH;

  ctx.clearRect(0, 0, W, H);

  // Horizontal grid
  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.lineWidth = 0.5;
  for (let kg = 84; kg <= 112; kg += 4) {
    const y = yOf(kg);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + pW, y); ctx.stroke();
  }

  // Checkpoint lines + right labels
  ctx.setLineDash([4, 5]);
  ctx.lineWidth = 1;
  const monoFont = "9px monospace";
  CHECKPOINTS.forEach((cp, idx) => {
    const y = yOf(cp);
    ctx.fillStyle = "rgba(245,158,11,0.35)";
    ctx.font = monoFont;
    ctx.textAlign = "left";
    ctx.fillText(`${cp}`, PAD.left + pW + 4, y + 3);
    if (idx % 2 === 0) {
      ctx.strokeStyle = "rgba(245,158,11,0.27)";
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + pW, y); ctx.stroke();
    }
  });
  ctx.setLineDash([]);

  // Today vertical line
  if (todayMs >= winStart && todayMs <= winEnd) {
    const x = xOf(todayMs);
    ctx.strokeStyle = "rgba(255,255,255,0.07)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top + pH); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = "rgba(255,255,255,0.1)";
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(PAD.left, PAD.top);    ctx.lineTo(PAD.left, PAD.top + pH);
  ctx.moveTo(PAD.left, PAD.top+pH); ctx.lineTo(PAD.left + pW, PAD.top + pH);
  ctx.stroke();

  // Y labels
  ctx.fillStyle = "#4b5563";
  ctx.font = "10px monospace";
  ctx.textAlign = "right";
  for (let kg = 88; kg <= 112; kg += 4) {
    ctx.fillText(`${kg}`, PAD.left - 5, yOf(kg) + 3);
  }

  // X ticks
  const days = rangeMs / DAY_MS;
  const step = days <= 7 ? 1 : days <= 21 ? 2 : days <= 60 ? 7 : days <= 120 ? 14 : 30;
  const firstTick = Math.ceil(winStart / (step * DAY_MS)) * (step * DAY_MS);
  ctx.fillStyle = "#4b5563";
  ctx.font = "10px monospace";
  ctx.textAlign = "center";
  for (let t = firstTick; t <= winEnd; t += step * DAY_MS) {
    const x = xOf(t);
    ctx.fillText(msToLabel(t), x, PAD.top + pH + 18);
    ctx.strokeStyle = "rgba(255,255,255,0.07)";
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, PAD.top + pH); ctx.lineTo(x, PAD.top + pH + 4); ctx.stroke();
  }

  const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));

  // Weight line
  const visible = sorted
    .map(e => ({ ms: dateToMs(e.date), w: e.weight }))
    .filter(p => p.ms >= winStart && p.ms <= winEnd);

  if (visible.length >= 2) {
    ctx.strokeStyle = "#22c55e";
    ctx.lineWidth = 2.5;
    ctx.lineJoin = "round";
    ctx.beginPath();
    visible.forEach((p, i) => {
      i === 0 ? ctx.moveTo(xOf(p.ms), yOf(p.w)) : ctx.lineTo(xOf(p.ms), yOf(p.w));
    });
    ctx.stroke();
  }

  // Dots
  visible.forEach((p, i) => {
    const isLast = i === visible.length - 1;
    ctx.beginPath();
    ctx.arc(xOf(p.ms), yOf(p.w), isLast ? 5 : 3, 0, Math.PI * 2);
    ctx.fillStyle = isLast ? "#22c55e" : "rgba(34,197,94,0.65)";
    ctx.fill();
    if (isLast) {
      ctx.strokeStyle = "rgba(255,255,255,0.7)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  });

  // Weight label on last visible point
  if (visible.length > 0) {
    const p = visible[visible.length - 1];
    const x = xOf(p.ms), y = yOf(p.w);
    ctx.fillStyle = "#22c55e";
    ctx.font = "bold 11px monospace";
    ctx.textAlign = x > PAD.left + pW - 60 ? "right" : "left";
    ctx.fillText(`${p.w.toFixed(1)} kg`, x + (x > PAD.left + pW - 60 ? -10 : 10), y - 8);
  }
}

function DatePicker({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const [viewing, setViewing] = useState(() => {
    const d = value ? new Date(value + "T00:00:00") : new Date();
    return { year: d.getFullYear(), month: d.getMonth() };
  });
  const { year, month } = viewing;
  const totalDays   = new Date(year, month + 1, 0).getDate();
  const startOffset = (new Date(year, month, 1).getDay() + 6) % 7;
  const cells = [...Array(startOffset).fill(null), ...Array.from({length:totalDays},(_,i)=>i+1)];
  const sel   = value ? new Date(value + "T00:00:00") : null;

  return (
    <div style={{ position:"relative" }}>
      <button onClick={() => setOpen(o => !o)} style={{
        background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)",
        borderRadius:8, color:"#cbd5e1", padding:"8px 12px", fontSize:13,
        fontFamily:"monospace", cursor:"pointer", minWidth:130, textAlign:"left",
      }}>{value || "wybierz datę"}</button>
      {open && (
        <div style={{ position:"absolute", top:"calc(100% + 6px)", left:0, zIndex:200,
          background:"#1e2d42", border:"1px solid rgba(255,255,255,0.12)",
          borderRadius:10, padding:12, width:236 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <button onClick={() => setViewing(v => ({ month: v.month===0?11:v.month-1, year: v.month===0?v.year-1:v.year }))}
              style={{ background:"none", border:"none", color:"#94a3b8", cursor:"pointer", fontSize:16, padding:"0 6px" }}>‹</button>
            <span style={{ fontSize:12, fontFamily:"monospace", color:"#f1f5f9" }}>{MONTHS_FULL[month]} {year}</span>
            <button onClick={() => setViewing(v => ({ month: v.month===11?0:v.month+1, year: v.month===11?v.year+1:v.year }))}
              style={{ background:"none", border:"none", color:"#94a3b8", cursor:"pointer", fontSize:16, padding:"0 6px" }}>›</button>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:4 }}>
            {DAYS_SHORT.map(d => <div key={d} style={{ fontSize:9, color:"#475569", textAlign:"center", fontFamily:"monospace" }}>{d}</div>)}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
            {cells.map((d, i) => {
              if (!d) return <div key={`_${i}`}/>;
              const isSel = sel && sel.getFullYear()===year && sel.getMonth()===month && sel.getDate()===d;
              const isNow = new Date().getFullYear()===year && new Date().getMonth()===month && new Date().getDate()===d;
              return (
                <button key={d} onClick={() => {
                  onChange(`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
                  setOpen(false);
                }} style={{
                  background: isSel?"#22c55e": isNow?"rgba(34,197,94,0.15)":"none",
                  border:"none", borderRadius:6,
                  color: isSel?"#052e16": isNow?"#22c55e":"#cbd5e1",
                  fontSize:11, fontFamily:"monospace", padding:"5px 0", cursor:"pointer",
                }}>{d}</button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function HealthTracker() {
  const todayMs = (() => { const d = new Date(); d.setHours(0,0,0,0); return d.getTime(); })();

  const [entries,     setEntries]     = useState(INITIAL_DATA);
  const [inputWeight, setInputWeight] = useState("");
  const [inputDate,   setInputDate]   = useState(msToDateStr(todayMs));
  const [status,      setStatus]      = useState("");
  const [loaded,      setLoaded]      = useState(false);
  const [rangeMs,     setRangeMs]     = useState(28 * DAY_MS);

  const canvasRef = useRef(null);
  const wrapRef   = useRef(null);

  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) setEntries(JSON.parse(saved));
      } catch {}
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (loaded) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      } catch {}
    }
  }, [entries, loaded]);

  const redraw = useCallback(() => {
    if (canvasRef.current) drawChart(canvasRef.current, entries, rangeMs, todayMs);
  }, [entries, rangeMs, todayMs]);

  useEffect(() => {
    if (!loaded) return;
    const id = setTimeout(redraw, 40);
    return () => clearTimeout(id);
  }, [loaded, redraw]);

  useEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    const ro = new ResizeObserver(() => setTimeout(redraw, 20));
    ro.observe(el);
    return () => ro.disconnect();
  }, [redraw]);

  useEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    const onWheel = e => {
      e.preventDefault();
      setRangeMs(p => Math.max(4*DAY_MS, Math.min(400*DAY_MS, Math.round(p * (e.deltaY > 0 ? 1.18 : 0.85)))));
    };
    el.addEventListener("wheel", onWheel, { passive: false });
    return () => el.removeEventListener("wheel", onWheel);
  }, []);

  function addEntry() {
    const w = parseFloat(parseFloat(inputWeight).toFixed(1));
    if (!inputWeight || isNaN(w)) { setStatus("Podaj prawid\u0142ow\u0105 wag\u0119."); return; }
    const exists = entries.find(e => e.date === inputDate);
    setEntries(exists
      ? entries.map(e => e.date===inputDate ? {...e, weight:w} : e)
      : [...entries, { date:inputDate, weight:w }]
    );
    setStatus(exists ? `Zaktualizowano ${formatDate(inputDate)}.` : `Dodano ${w} kg \u2014 ${formatDate(inputDate)}`);
    setInputWeight("");
  }

  const sorted   = [...entries].sort((a,b)=>a.date.localeCompare(b.date));
  const latest   = sorted[sorted.length-1];
  const prev     = sorted[sorted.length-2];
  const delta    = latest && prev ? latest.weight - prev.weight : null;
  const nextCp   = latest ? nextCheckpoint(latest.weight) : null;
  const distToCp = latest ? (latest.weight - nextCp).toFixed(1) : null;
  const progress = latest ? Math.round(((110 - latest.weight) / 24) * 100) : 0;

  return (
    <div style={{ minHeight:"100vh", background:"#1a2333", color:"#f1f5f9", fontFamily:"sans-serif" }}>

      <div style={{ borderBottom:"1px solid rgba(255,255,255,0.06)", padding:"20px 24px 16px", display:"flex", alignItems:"baseline", gap:10 }}>
        <span style={{ fontSize:18, fontWeight:500, letterSpacing:"-0.02em", fontFamily:"'DM Sans',sans-serif" }}>weight tracker</span>
        <span style={{ fontSize:11, color:"#334155", fontFamily:"monospace" }}>v0.2</span>
      </div>

      <div style={{ padding:"20px 24px", maxWidth:680, margin:"0 auto" }}>

        {latest && (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:20 }}>
            {[
              { label:"aktualna waga",       value:`${latest.weight.toFixed(1)} kg`, sub: delta!==null ? `${delta>0?"+":""}${delta.toFixed(1)} kg vs poprzedni` : "pierwszy wpis", color: delta!==null&&delta<0?"#22c55e":delta>0?"#f87171":"#94a3b8" },
              { label:"nast\u0119pny checkpoint", value:`${nextCp} kg`,                  sub:`jeszcze ${distToCp} kg`, color:"#f59e0b" },
              { label:"post\u0119p do celu",      value:`${progress}%`,                  sub:"cel: 86 kg",            color:"#818cf8" },
            ].map(s => (
              <div key={s.label} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:10, padding:"12px 14px" }}>
                <div style={{ fontSize:10, color:"#475569", fontFamily:"monospace", letterSpacing:"0.06em", marginBottom:6, textTransform:"uppercase" }}>{s.label}</div>
                <div style={{ fontSize:22, fontWeight:300, color:s.color, letterSpacing:"-0.02em", lineHeight:1 }}>{s.value}</div>
                <div style={{ fontSize:11, color:"#475569", marginTop:5 }}>{s.sub}</div>
              </div>
            ))}
          </div>
        )}

        <div ref={wrapRef} style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:"16px 16px 10px", marginBottom:20 }}>
          <canvas ref={canvasRef} style={{ display:"block" }} />
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:8 }}>
            <span style={{ fontSize:10, color:"#334155", fontFamily:"monospace" }}>\u2195 scroll = zoom \u00b7 {Math.round(rangeMs/DAY_MS)} dni</span>
            <span style={{ fontSize:10, color:"#334155", fontFamily:"monospace" }}>{msToLabel(todayMs-rangeMs*0.75)} \u2192 {msToLabel(todayMs+rangeMs*0.25)}</span>
          </div>
        </div>

        <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:16, marginBottom:16 }}>
          <div style={{ fontSize:10, color:"#475569", fontFamily:"monospace", letterSpacing:"0.06em", marginBottom:12, textTransform:"uppercase" }}>nowy wpis</div>
          <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
            <DatePicker value={inputDate} onChange={setInputDate}/>
            <input type="number" step="0.1" placeholder="waga (kg)" value={inputWeight}
              onChange={e=>setInputWeight(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addEntry()}
              style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, color:"#f1f5f9", padding:"8px 12px", fontSize:13, fontFamily:"monospace", outline:"none", width:120 }}/>
            <button onClick={addEntry} style={{ background:"#22c55e", border:"none", borderRadius:8, color:"#052e16", padding:"8px 18px", fontSize:13, fontWeight:500, cursor:"pointer" }}>Dodaj</button>
          </div>
          {status && <div style={{ fontSize:12, color:"#22c55e", marginTop:10, fontFamily:"monospace" }}>\u2713 {status}</div>}
        </div>

        <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:16 }}>
          <div style={{ fontSize:10, color:"#475569", fontFamily:"monospace", letterSpacing:"0.06em", marginBottom:12, textTransform:"uppercase" }}>historia</div>
          {[...sorted].reverse().map((e, i) => {
            const prevE = sorted[sorted.length-2-i];
            const d = prevE ? e.weight - prevE.weight : null;
            return (
              <div key={e.date} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
                <span style={{ fontSize:12, color:"#64748b", fontFamily:"monospace" }}>{formatDate(e.date)}</span>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  {CHECKPOINTS.includes(e.weight) && <span style={{ fontSize:9, color:"#f59e0b", background:"rgba(245,158,11,0.1)", borderRadius:4, padding:"2px 6px", fontFamily:"monospace" }}>CHECKPOINT</span>}
                  {d!==null && <span style={{ fontSize:11, color:d<0?"#22c55e":d>0?"#f87171":"#475569", fontFamily:"monospace" }}>{d>0?"+":""}{d.toFixed(1)}</span>}
                  <span style={{ fontSize:14, color:"#f1f5f9", fontFamily:"monospace", minWidth:60, textAlign:"right" }}>{e.weight.toFixed(1)} kg</span>
                </div>
              </div>
            );
          })}
        </div>

      </div>
    </div>
  );
}

ReactDOM.render(<HealthTracker />, document.getElementById('root'));
  </script>
</body>
</html>
